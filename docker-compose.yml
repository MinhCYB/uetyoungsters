services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: cc_user
      POSTGRES_PASSWORD: cc_pass
      POSTGRES_DB: career_compass
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cc_user -d career_compass"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-career_compass}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-career_compass_dev_secret}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - miniodata:/data

  crawl-service:
    build:
      context: .
      dockerfile: crawl-service/Dockerfile
    depends_on:
      - db
    environment:
      DATABASE_URL: postgresql://cc_user:cc_pass@db:5432/career_compass
      CRAWL_DATABASE_SCHEMA: ${CRAWL_DATABASE_SCHEMA}
      CAREER_COMPASS_ROOT: /app
      AI_WORKER_URL: http://ai-worker-service:8000
      TRANSLATION_MODEL: ${TRANSLATION_MODEL:-gemini-3.1-flash-lite}
    volumes:
      - ./data:/app/data
      - ./reports:/app/reports

  backend-api:
    build:
      context: .
      dockerfile: backend-api/Dockerfile
    depends_on:
      db:
        condition: service_healthy
      minio:
        condition: service_started
      ai-worker-service:
        condition: service_healthy
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://cc_user:cc_pass@db:5432/career_compass
      AUTH_SECRET: ${AUTH_SECRET:-replace-this-secret-before-production}
      COOKIE_SECURE: ${COOKIE_SECURE:-false}
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-career_compass}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-career_compass_dev_secret}
      MINIO_BUCKET: career-compass-documents
      MINIO_SECURE: "false"
      COMPANION_LLM_MODE: ${COMPANION_LLM_MODE:-live}
      AI_WORKER_URL: ${AI_WORKER_URL:-http://ai-worker-service:8000}
      AI_WORKER_TIMEOUT_SECONDS: ${AI_WORKER_TIMEOUT_SECONDS:-30}
      COMPANION_LLM_MAX_TOKENS: ${COMPANION_LLM_MAX_TOKENS:-2048}
      COMPANION_LLM_FALLBACK_ENABLED: ${COMPANION_LLM_FALLBACK_ENABLED:-false}
      CRAWL_DATABASE_SCHEMA: ${CRAWL_DATABASE_SCHEMA}

  ai-worker-service:
    build: ./ai-worker-service
    ports:
      - "8001:8000"
    environment:
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      DEFAULT_MODEL: ${DEFAULT_MODEL}
      DEFAULT_MAX_TOKENS: ${DEFAULT_MAX_TOKENS}
      REQUEST_TIMEOUT_SECONDS: ${REQUEST_TIMEOUT_SECONDS}
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 3s
      retries: 3

  roadmap-service:
    build: ./roadmap-service
    depends_on:
      - db
    environment:
      DATABASE_URL: postgresql://cc_user:cc_pass@db:5432/career_compass
      BACKEND_API_URL: http://backend-api:8000
      LLM_API_KEY: ${LLM_API_KEY:-}

  nginx:
    build: ./nginx
    depends_on:
      - backend-api
      - roadmap-service
      - frontend
    ports:
      - "80:80"

  frontend:
    build: ./frontend
    environment:
      VITE_API_BASE_URL: /api
    volumes:
      - ./frontend:/app
      - /app/node_modules
    # Không expose port ra host — nginx là cửa vào duy nhất, truy cập qua http://localhost

volumes:
  pgdata:
  miniodata:
