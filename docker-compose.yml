services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: cc_user
      POSTGRES_PASSWORD: cc_pass
      POSTGRES_DB: career_compass
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  crawl-service:
    build:
      context: .
      dockerfile: crawl-service/Dockerfile
    depends_on:
      - db
    environment:
      DATABASE_URL: postgresql://cc_user:cc_pass@db:5432/career_compass
      CAREER_COMPASS_ROOT: /app
    volumes:
      - ./data:/app/data
      - ./reports:/app/reports

  backend-api:
    build: ./backend-api
    depends_on:
      - db
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://cc_user:cc_pass@db:5432/career_compass

  ai-worker-service:
    build: ./ai-worker-service
    depends_on:
      - db
      - redis
    environment:
      DATABASE_URL: postgresql://cc_user:cc_pass@db:5432/career_compass
      REDIS_URL: redis://redis:6379/0

  roadmap-service:
    build: ./roadmap-service
    depends_on:
      - db
    environment:
      DATABASE_URL: postgresql://cc_user:cc_pass@db:5432/career_compass
      BACKEND_API_URL: http://backend-api:8000
      LLM_API_KEY: ${LLM_API_KEY:-}

  nginx:
    build: ./nginx
    depends_on:
      - backend-api
      - roadmap-service
      - frontend
    ports:
      - "80:80"

  frontend:
    build: ./frontend
    environment:
      VITE_API_BASE_URL: /api
    volumes:
      - ./frontend:/app
      - /app/node_modules
    # Không expose port ra host — nginx là cửa vào duy nhất, truy cập qua http://localhost

volumes:
  pgdata: