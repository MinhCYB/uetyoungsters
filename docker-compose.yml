services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: cc_user
      POSTGRES_PASSWORD: cc_pass
      POSTGRES_DB: career_compass
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  crawl-service:
    build:
      context: .
      dockerfile: crawl-service/Dockerfile
    depends_on:
      - db
    environment:
      DATABASE_URL: postgresql://cc_user:cc_pass@db:5432/career_compass
    volumes:
      - ./data:/app/data
      - ./reports:/app/reports
    # Khong expose port - override command de chay collector/pipeline thu cong.

  profile-service:
    build: ./profile-service
    depends_on:
      - db
    ports:
      - "8001:8000"
    environment:
      DATABASE_URL: postgresql://cc_user:cc_pass@db:5432/career_compass
    volumes:
      - ./profile-service:/app

  core:
    build:
      context: .
      dockerfile: core/Dockerfile
    depends_on:
      - db
      - profile-service
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://cc_user:cc_pass@db:5432/career_compass
      PROFILE_SERVICE_URL: http://profile-service:8000
    volumes:
      - ./core:/app/core
      - ./data/processed:/app/data/processed:ro
      - ./backend/shared/taxonomy.json:/app/backend/shared/taxonomy.json:ro

volumes:
  pgdata:
