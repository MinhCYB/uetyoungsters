services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: cc_user
      POSTGRES_PASSWORD: cc_pass
      POSTGRES_DB: career_compass
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  crawl-service:
    build:
      context: .
      dockerfile: crawl-service/Dockerfile
    depends_on:
      - db
    environment:
      DATABASE_URL: postgresql://cc_user:cc_pass@db:5432/career_compass
      CAREER_COMPASS_ROOT: /app
    volumes:
      - ./data:/app/data
      - ./reports:/app/reports

  backend-api:
    build:
      context: .
      dockerfile: backend-api/Dockerfile
    depends_on:
      - db
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://cc_user:cc_pass@db:5432/career_compass
      AUTH_SECRET: ${AUTH_SECRET:-replace-this-secret-before-production}
      COOKIE_SECURE: ${COOKIE_SECURE:-false}

  ai-worker-service:
    build: ./ai-worker-service
    ports:
      - "8001:8000"
    environment:
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      DEFAULT_MODEL: ${DEFAULT_MODEL:-gemini-2.5-flash}
      DEFAULT_MAX_TOKENS: ${DEFAULT_MAX_TOKENS:-2048}
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 3s
      retries: 3

  roadmap-service:
    build: ./roadmap-service
    depends_on:
      - db
    environment:
      DATABASE_URL: postgresql://cc_user:cc_pass@db:5432/career_compass
      BACKEND_API_URL: http://backend-api:8000
      LLM_API_KEY: ${LLM_API_KEY:-}

  nginx:
    build: ./nginx
    depends_on:
      - backend-api
      - roadmap-service
      - frontend
    ports:
      - "80:80"

  frontend:
    build: ./frontend
    environment:
      VITE_API_BASE_URL: /api
    volumes:
      - ./frontend:/app
      - /app/node_modules
    # Không expose port ra host — nginx là cửa vào duy nhất, truy cập qua http://localhost

volumes:
  pgdata:
